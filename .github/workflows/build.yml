name: Build flx-browser

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FF_TAG: FIREFOX_150_0_1_RELEASE

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # ← raise to 6 hours (Actions max)

    steps:
      - name: Checkout patches
        uses: actions/checkout@v4
        with:
          path: flx-browser

      - name: Clone Firefox ${{ env.FF_TAG }}
        run: |
          git clone --depth 1 \
            --branch ${{ env.FF_TAG }} \
            https://github.com/mozilla/firefox firefox

      - name: Cache ~/.mozbuild toolchain
        uses: actions/cache@v4
        with:
          path: ~/.mozbuild
          key: mozbuild-${{ env.FF_TAG }}

      - name: Cache compiled objects
        uses: actions/cache@v4
        with:
          path: firefox/obj-x86_64-pc-linux-gnu
          key: objdir-${{ env.FF_TAG }}-${{ hashFiles('flx-browser/patches/*.patch', 'flx-browser/mozconfig') }}
          restore-keys: |
            objdir-${{ env.FF_TAG }}-

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip \
            python3-zstandard \
            libdbus-glib-1-dev libgtk-3-dev \
            libx11-dev libxt-dev \
            nasm nodejs clang lld \
            zip unzip watchman sccache

      - name: Bootstrap
        run: |
          cd firefox
          python3 ./mach bootstrap \
            --application-choice browser
        env:
          SHELL: /bin/bash
          MOZ_NOSPAM: 1
          MACH_BUILD_PYTHON_NATIVE_PACKAGE_SOURCE: system

      - name: Apply patches
        run: |
          cd firefox
          for patch in $(ls ../flx-browser/patches/*.patch 2>/dev/null | sort); do
            echo "── Applying $(basename $patch)"
            git apply --ignore-whitespace "$patch"
          done

      - name: Copy mozconfig
        run: cp flx-browser/mozconfig firefox/mozconfig

      - name: Build
        run: |
          cd firefox
          ./mach build
        env:
          SCCACHE_GHA_ENABLED: "true"        # ← compiler cache via sccache
          RUSTC_WRAPPER: sccache

      - name: Package
        run: cd firefox && ./mach package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flx-browser-linux-${{ env.FF_TAG }}
          path: firefox/obj-*/dist/*.tar.bz2
          retention-days: 14